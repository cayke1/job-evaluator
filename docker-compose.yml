services:
  db:
    image: postgres:17-alpine
    restart: unless-stopped
    environment:
      POSTGRES_USER: user
      POSTGRES_PASSWORD: pass
      POSTGRES_DB: job_evaluator
    volumes:
      - postgres_data:/var/lib/postgresql/data
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U user -d job_evaluator"]
      interval: 5s
      timeout: 5s
      retries: 5

  app:
    build: .
    restart: unless-stopped
    depends_on:
      db:
        condition: service_healthy
    environment:
      DATABASE_URL: postgresql://user:pass@db:5432/job_evaluator
      PORT: 3000
      SYNC_CRON: ${SYNC_CRON:-0 */6 * * *}
      VAGASPRAJR_PAGE_SIZE: ${VAGASPRAJR_PAGE_SIZE:-50}
      VAGASPRAJR_MAX_PAGES: ${VAGASPRAJR_MAX_PAGES:-5}
    ports:
      - "3000:3000"

volumes:
  postgres_data:
